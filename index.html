<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مایرا • کافه و رستوران</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#fffaf4;
    --bg-card:#ffffff;
    --bg-card-2:#fbf1e6;
    --text:#2c2420;
    --dim:#9a8b7f;
    --border:#f0e3d6;
    --navy:#243b55;
    --pink:#ff6f91;
    --orange:#ffa14a;
    --blue:#3eb8d6;
    --green:#57b880;
    --purple:#8a63d2;
    --danger:#ef5b5b;
  }
  *{box-sizing:border-box;}
  @keyframes fadeInUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
  @keyframes popIn{0%{opacity:0;transform:scale(.85);}100%{opacity:1;transform:scale(1);}}
  @media (prefers-reduced-motion: reduce){*,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important;}}
  body{margin:0;font-family:'Vazirmatn',system-ui,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;}
  .app{max-width:430px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative;padding-bottom:92px;overflow-x:hidden;}
  ::-webkit-scrollbar{display:none;}
  *{scrollbar-width:none;}

  .topbar{position:sticky;top:0;z-index:30;background:rgba(255,250,244,.96);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);}
  .topbar-row{display:flex;align-items:center;justify-content:space-between;padding:18px 18px 8px;}
  .brand-title{font-weight:800;font-size:20px;color:var(--navy);}
  .icon-btn{width:36px;height:36px;border-radius:50%;background:var(--bg-card-2);display:flex;align-items:center;justify-content:center;color:var(--navy);}
  .search-wrap{padding:4px 18px 14px;}
  .search-box{position:relative;}
  .search-box input{width:100%;background:var(--bg-card);border:1.5px solid var(--border);color:var(--text);border-radius:24px;padding:13px 44px 13px 18px;font-family:inherit;font-size:13.5px;outline:none;transition:border-color .25s ease;}
  .search-box input:focus{border-color:var(--pink);}
  .search-box i{position:absolute;right:18px;top:50%;transform:translateY(-50%);color:var(--dim);}

  /* Colorful category row - signature */
  .cat-row{display:flex;gap:14px;overflow-x:auto;padding:2px 18px 16px;margin:0 -18px;padding-inline:18px;}
  .cat-chip{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;}
  .cat-chip .circ{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;transition:transform .25s ease,box-shadow .25s ease;box-shadow:0 4px 10px rgba(0,0,0,.08);}
  .cat-chip.active .circ{transform:scale(1.12);box-shadow:0 8px 18px rgba(0,0,0,.18);}
  .cat-chip span{font-size:11px;color:var(--dim);font-weight:600;}
  .cat-chip.active span{color:var(--text);}

  .view{display:none;padding:0 18px 6px;}
  .view.active{display:block;animation:fadeIn .35s ease;}

  .offers-row{display:flex;gap:12px;margin-top:8px;}
  .offer-mini{flex:1;background:var(--bg-card);border:1px solid var(--border);border-radius:20px;padding:14px;text-align:center;opacity:0;animation:fadeInUp .5s ease forwards;}
  .offer-mini .badge{display:inline-block;font-size:11px;font-weight:700;color:#fff;padding:3px 10px;border-radius:10px;margin-bottom:8px;}
  .offer-mini .lbl{font-size:12.5px;font-weight:700;margin-bottom:8px;}
  .offer-mini button{background:var(--navy);color:#fff;border:none;border-radius:12px;padding:7px 14px;font-size:11.5px;font-weight:700;font-family:inherit;cursor:pointer;}

  .section-title{display:flex;align-items:center;gap:10px;margin:24px 0 12px;animation:fadeInUp .5s ease both;}
  .section-title h3{font-size:15px;margin:0;font-weight:800;}
  .section-title .line{flex:1;height:1px;background:var(--border);}

  .promo-card{display:flex;gap:14px;background:var(--bg-card);border:1px solid var(--border);border-radius:20px;padding:12px;align-items:center;box-shadow:0 6px 18px rgba(0,0,0,.04);opacity:0;animation:fadeInUp .5s ease both;}
  .promo-card .img{width:78px;height:78px;border-radius:16px;overflow:hidden;flex-shrink:0;background:var(--bg-card-2);display:flex;align-items:center;justify-content:center;font-size:32px;color:var(--pink);}
  .promo-card .name{font-weight:700;font-size:14px;}
  .promo-card .rating{color:var(--dim);font-size:11.5px;margin:4px 0;display:flex;align-items:center;gap:4px;}
  .promo-card .rating i{color:#ffb648;}
  .promo-card .price{color:var(--navy);font-weight:800;font-size:14px;}

  .cat-block{background:var(--bg-card);border:1px solid var(--border);border-radius:18px;margin-bottom:10px;overflow:hidden;opacity:0;animation:fadeInUp .45s ease forwards;box-shadow:0 4px 14px rgba(0,0,0,.03);}
  .cat-block.open{border-color:var(--pink);}
  .cat-head{display:flex;align-items:center;gap:12px;padding:15px 16px;cursor:pointer;}
  .cat-head .cicon{width:38px;height:38px;border-radius:12px;background:var(--bg-card-2);display:flex;align-items:center;justify-content:center;color:var(--pink);font-size:16px;flex-shrink:0;}
  .cat-head .cname{font-weight:700;font-size:14.5px;flex:1;}
  .cat-head .ccount{color:var(--dim);font-size:12.5px;}
  .cat-head i.chev{color:var(--dim);transition:transform .3s ease;}
  .cat-block.open .cat-head i.chev{transform:rotate(180deg);color:var(--pink);}
  .cat-items{max-height:0;overflow:hidden;transition:max-height .35s cubic-bezier(.4,0,.2,1);}
  .cat-block.open .cat-items{max-height:3000px;}
  .item-row{display:flex;gap:12px;align-items:center;padding:12px 16px;border-top:1px solid var(--border);}
  .item-row .img{width:60px;height:60px;border-radius:14px;overflow:hidden;flex-shrink:0;background:var(--bg-card-2);display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:22px;}
  .item-row .name{font-weight:700;font-size:13.5px;}
  .item-row .desc{color:var(--dim);font-size:11.5px;margin:2px 0 5px;}
  .item-row .price{color:var(--navy);font-weight:800;font-size:13px;}

  .empty-state{text-align:center;padding:40px 20px;color:var(--dim);}
  .empty-state i{font-size:30px;margin-bottom:10px;color:var(--pink);}

  .placeholder-box{background:var(--bg-card);border:1px solid var(--border);border-radius:18px;padding:26px 20px;text-align:center;margin-top:16px;}
  .placeholder-box i{font-size:28px;color:var(--pink);margin-bottom:10px;}
  .placeholder-box p{margin:0;color:var(--dim);font-size:12.5px;line-height:1.9;text-align:right;}

  .bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(255,255,255,.97);backdrop-filter:blur(10px);border-top:1px solid var(--border);display:flex;z-index:40;padding:8px 6px calc(8px + env(safe-area-inset-bottom));}
  .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 0;cursor:pointer;color:var(--dim);font-size:10.5px;border:none;background:none;font-family:inherit;}
  .nav-item i{font-size:17px;}
  .nav-item.active{color:var(--pink);}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="topbar-row">
      <div class="brand-title">مایرا</div>
      <div style="display:flex;gap:8px;">
        <div class="icon-btn"><i class="fa-regular fa-heart"></i></div>
        <div class="icon-btn"><i class="fa-solid fa-bars"></i></div>
      </div>
    </div>
    <div class="search-wrap">
      <div class="search-box">
        <input id="searchInput" type="text" placeholder="برای جستجو، نام محصول را بنویسید...">
        <i class="fa-solid fa-magnifying-glass"></i>
      </div>
    </div>
    <div class="cat-row" id="catRow"></div>
  </div>

  <div class="view active" id="view-home">
    <div class="offers-row">
      <div class="offer-mini" style="animation-delay:.05s">
        <span class="badge" style="background:var(--pink);">۵٪ تخفیف</span>
        <div class="lbl">صبحانه با ۵٪ تخفیف</div>
        <button>مشاهده</button>
      </div>
      <div class="offer-mini" style="animation-delay:.12s">
        <span class="badge" style="background:var(--orange);">۲۰٪ تخفیف</span>
        <div class="lbl">پیش غذا با ۲۰٪ تخفیف</div>
        <button>مشاهده</button>
      </div>
    </div>

    <div class="section-title"><h3>پیشنهاد روز 🎉</h3><span class="line"></span></div>
    <div id="offerContainer"></div>

    <div class="section-title"><h3>شگفت‌انگیزهای امروز 🍰</h3><span class="line"></span></div>
    <div id="promoContainer" style="display:flex;flex-direction:column;gap:12px;"></div>
  </div>

  <div class="view" id="view-menu">
    <div id="categoriesContainer" style="margin-top:10px;"></div>
  </div>

  <div class="view" id="view-info">
    <div class="placeholder-box">
      <div><i class="fa-solid fa-circle-info"></i></div>
      <h4 style="text-align:center;">درباره مایرا</h4>
      <p><i class="fa-solid fa-location-dot" style="color:var(--pink);width:18px;margin-left:16px;"></i>بلوار اندرزگو، پلاک ۱۲<br><br>
      <i class="fa-solid fa-phone" style="color:var(--pink);width:18px;margin-left:16px;"></i>۰۲۱-۲۲۳۳۴۴۵۵<br><br>
      <i class="fa-solid fa-clock" style="color:var(--pink);width:18px;margin-left:16px;"></i>هرروز ۸ صبح تا ۱۱ شب</p>
    </div>
  </div>

  <div class="bottom-nav">
    <button class="nav-item active" data-nav="home" onclick="switchTab('home')"><i class="fa-solid fa-house"></i><span>خانه</span></button>
    <button class="nav-item" data-nav="menu" onclick="switchTab('menu')"><i class="fa-solid fa-utensils"></i><span>منو</span></button>
    <button class="nav-item" data-nav="info" onclick="switchTab('info')"><i class="fa-solid fa-circle-info"></i><span>اطلاعات</span></button>
  </div>
</div>

<script>
const categories = [
  {name:'پیتزا',icon:'fa-pizza-slice',color:'var(--orange)'},
  {name:'بار سرد',icon:'fa-mug-saucer',color:'var(--blue)'},
  {name:'دونات',icon:'fa-circle-notch',color:'var(--navy)'},
  {name:'بار گرم',icon:'fa-mug-hot',color:'var(--green)'},
  {name:'کیک و دسر',icon:'fa-cake-candles',color:'var(--purple)'},
];
const menuItems = [
  {id:1,name:'پیتزا مخصوص مایرا',category:'پیتزا',price:340000,desc:'مخلوط پپرونی و قارچ',rating:4.7,reviews:88},
  {id:2,name:'پیتزا مارگاریتا',category:'پیتزا',price:260000,desc:'پنیر موزارلا و ریحان',rating:4.5,reviews:52},
  {id:3,name:'آیس‌لاته وانیل',category:'بار سرد',price:98000,desc:'اسپرسو، شیر یخ و وانیل',rating:4.6,reviews:74},
  {id:4,name:'موهیتو توت‌فرنگی',category:'بار سرد',price:110000,desc:'نعنا تازه و توت فرنگی',rating:4.4,reviews:39},
  {id:5,name:'دونات شکلاتی',category:'دونات',price:65000,desc:'گلیز شکلات تلخ',rating:4.8,reviews:120},
  {id:6,name:'دونات نوتلا',category:'دونات',price:72000,desc:'پر شده با نوتلا',rating:4.9,reviews:96},
  {id:7,name:'لاته کارامل',category:'بار گرم',price:88000,desc:'اسپرسو دوبل و کارامل',rating:4.6,reviews:65},
  {id:8,name:'موکای گرم',category:'بار گرم',price:92000,desc:'شکلات و اسپرسو',rating:4.5,reviews:44},
  {id:9,name:'چیزکیک شاه توت',category:'کیک و دسر',price:96000,desc:'جاده زده شده برای شاه توت',rating:4.9,reviews:127},
  {id:10,name:'تیرامیسو',category:'کیک و دسر',price:89000,desc:'قهوه و ماسکارپونه',rating:4.7,reviews:81},
];
let activeCat = 'دونات';

function fmtPrice(p){return Number(p).toLocaleString('en-US');}

function renderCatRow(){
  document.getElementById('catRow').innerHTML = categories.map(c=>`
    <div class="cat-chip ${c.name===activeCat?'active':''}" onclick="selectCat('${c.name}')">
      <div class="circ" style="background:${c.color};"><i class="fa-solid ${c.icon}"></i></div>
      <span>${c.name}</span>
    </div>`).join('');
}
function selectCat(name){
  activeCat = name;
  renderCatRow();
  switchTab('menu');
  openCategory = name;
  renderMenu('');
}

function renderHome(){
  const offerItem = [...menuItems].sort((a,b)=>b.rating-a.rating)[0];
  document.getElementById('offerContainer').innerHTML = `
    <div class="promo-card" style="animation-delay:.1s;">
      <div class="img"><i class="fa-solid fa-cake-candles"></i></div>
      <div style="flex:1;">
        <div class="name">${offerItem.name}</div>
        <div class="rating"><i class="fa-solid fa-star"></i> ${offerItem.rating} (${offerItem.reviews} نظر)</div>
        <div class="price">${fmtPrice(offerItem.price)} تومان</div>
      </div>
      <div style="text-align:center;color:var(--pink);"><i class="fa-regular fa-heart" style="font-size:16px;"></i><div style="font-size:11px;margin-top:6px;color:var(--navy);cursor:pointer;">جزئیات بیشتر</div></div>
    </div>`;

  const promos = menuItems.filter(i=>i.category==='دونات' || i.category==='کیک و دسر').slice(0,3);
  document.getElementById('promoContainer').innerHTML = promos.map((it,idx)=>`
    <div class="promo-card" style="animation-delay:${.1+idx*.08}s;">
      <div class="img"><i class="fa-solid fa-cookie"></i></div>
      <div style="flex:1;">
        <div class="name">${it.name}</div>
        <div class="rating"><i class="fa-solid fa-star"></i> ${it.rating} (${it.reviews} نظر)</div>
        <div class="price">${fmtPrice(it.price)} تومان</div>
      </div>
    </div>`).join('');
}

let openCategory = 'دونات';
function renderMenu(filterTerm){
  const container = document.getElementById('categoriesContainer');
  let items = menuItems;
  if(filterTerm){
    const t = filterTerm.toLowerCase();
    items = items.filter(i=>i.name.toLowerCase().includes(t)||i.desc.toLowerCase().includes(t)||i.category.toLowerCase().includes(t));
  }
  if(items.length===0){
    container.innerHTML = `<div class="empty-state"><i class="fa-solid fa-magnifying-glass"></i><div>موردی پیدا نشد</div></div>`;
    return;
  }
  const cats = [];
  items.forEach(i=>{if(!cats.includes(i.category))cats.push(i.category);});
  container.innerHTML = cats.map((cat,ci)=>{
    const catItems = items.filter(i=>i.category===cat);
    const isOpen = filterTerm ? true : (openCategory===cat);
    const catInfo = categories.find(c=>c.name===cat)||{icon:'fa-utensils'};
    return `
    <div class="cat-block ${isOpen?'open':''}" data-cat="${cat}" style="animation-delay:${ci*0.08}s">
      <div class="cat-head" onclick="toggleCategory('${cat}')">
        <div class="cicon"><i class="fa-solid ${catInfo.icon}"></i></div>
        <div class="cname">${cat}</div>
        <div class="ccount">(${catItems.length})</div>
        <i class="fa-solid fa-chevron-down chev"></i>
      </div>
      <div class="cat-items">
        ${catItems.map(it=>`
          <div class="item-row">
            <div class="img"><i class="fa-solid ${catInfo.icon}"></i></div>
            <div style="flex:1;">
              <div class="name">${it.name}</div>
              <div class="desc">${it.desc}</div>
              <div style="display:flex;justify-content:space-between;align-items:center;">
                <span class="price">${fmtPrice(it.price)} تومان</span>
                <span style="font-size:11px;color:var(--dim);"><i class="fa-solid fa-star" style="color:#ffb648;"></i> ${it.rating}</span>
              </div>
            </div>
          </div>`).join('')}
      </div>
    </div>`;
  }).join('');
}
function toggleCategory(cat){
  openCategory = (openCategory===cat)?null:cat;
  renderMenu(document.getElementById('searchInput').value);
}
function switchTab(tab){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  const target = document.getElementById(`view-${tab}`);
  void target.offsetWidth;
  target.classList.add('active');
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  document.querySelector(`.nav-item[data-nav="${tab}"]`)?.classList.add('active');
}
document.getElementById('searchInput').addEventListener('input',(e)=>{
  if(e.target.value) switchTab('menu');
  renderMenu(e.target.value);
});
renderCatRow();
renderHome();
renderMenu();
</script>
</body>
</html>
